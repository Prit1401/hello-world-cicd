name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: npm install

    - name: Run unit tests
      run: npm test

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: node-app
        path: .

  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build docker image
      run: docker build -t hello-app .

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:

    - name: Deploy to Kubernetes
      run: echo "Deploying to Kubernetes"
